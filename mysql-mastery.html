// ─── Syntax highlighter (line-by-line to avoid nesting issues) ───
function hl(code) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return code.split('\n').map(line => {
    const e = esc(line);
    if (e.trim().startsWith('--')) return `<span class="cmt">${e}</span>`;
    const ci = e.indexOf('--');
    let main = ci >= 0 ? e.slice(0, ci) : e;
    const comment = ci >= 0 ? `<span class="cmt">${e.slice(ci)}</span>` : '';
    main = main
      .replace(/'[^']*'/g, m => `<span class="str">${m}</span>`)
      .replace(/\b(COUNT|SUM|AVG|MIN|MAX|IFNULL|COALESCE|CONCAT|SUBSTRING|UPPER|LOWER|TRIM|NOW|CURDATE|ROUND|FLOOR|CEIL|ABS|LENGTH|DATE_SUB|DATE_ADD|DATEDIFF|LAST_INSERT_ID|GROUP_CONCAT|CAST|CONVERT|ISNULL|NULLIF|YEAR|MONTH|DAY)\s*(?=\()/gi,
             m => `<span class="fn">${m}</span>`)
      .replace(/\b(SELECT|FROM|WHERE|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|DATABASE|USE|DROP|ALTER|ADD|COLUMN|JOIN|INNER|LEFT|RIGHT|FULL|OUTER|CROSS|ON|GROUP BY|ORDER BY|HAVING|LIMIT|OFFSET|DISTINCT|AS|AND|OR|NOT|IN|LIKE|BETWEEN|IS NULL|IS NOT NULL|EXISTS|CASE|WHEN|THEN|ELSE|END|INDEX|VIEW|TRIGGER|PROCEDURE|FUNCTION|BEGIN|COMMIT|ROLLBACK|START TRANSACTION|SAVEPOINT|AFTER|BEFORE|FOR EACH ROW|CALL|RETURN|RETURNS|IF|DECLARE|DELIMITER|AUTO_INCREMENT|UNIQUE|CHECK|DEFAULT|CONSTRAINT|PRIMARY KEY|FOREIGN KEY|REFERENCES|ON DELETE|ON UPDATE|CASCADE|SET NULL|RESTRICT|SHOW|EXPLAIN|DESCRIBE|TRUNCATE|RENAME|MODIFY|ENGINE|CHARSET|INTERVAL|ASC|DESC|BY)\b/gi,
             m => `<span class="kw">${m}</span>`)
      .replace(/\b(INT|TINYINT|SMALLINT|BIGINT|VARCHAR|CHAR|TEXT|LONGTEXT|MEDIUMTEXT|DECIMAL|FLOAT|DOUBLE|BOOLEAN|BOOL|DATE|DATETIME|TIMESTAMP|ENUM|JSON)\b/gi,
             m => `<span class="tp">${m}</span>`)
      .replace(/\b(\d+\.?\d*)\b/g, m => `<span class="nm">${m}</span>`);
    return main + comment;
  }).join('\n');
}

function pre(code, lbl='SQL') {
  return `<pre><span class="lbl">${lbl}</span>${hl(code)}</pre>`;
}

const SCHEMA = `<div class="schema-strip">📎 TechMart Schema &nbsp;|&nbsp; <span>customers</span>(id, name, email, city, created_at) &nbsp;·&nbsp; <span>products</span>(id, name, category, price, stock) &nbsp;·&nbsp; <span>orders</span>(id, customer_id, total, status, created_at) &nbsp;·&nbsp; <span>order_items</span>(id, order_id, product_id, quantity, price)</div>`;

const CNOTE = `<div class="cnote">🔗 All examples run against the same <strong>TechMart</strong> database built from Topic 1 onward — every query is production-connected.</div>`;

// ─── TOPIC DATA ───────────────────────────────────────────────────────────────
const topics = [
{
  id:0, g:'Overview', emoji:'📚', title:'SQL Command Categories — DDL · DML · DQL · DCL · TCL',
  def:'SQL is divided into 5 sub-languages by purpose — DDL shapes database structure, DML manipulates rows, DQL reads data, DCL controls access permissions, and TCL manages transaction boundaries. Every SQL statement you will ever write belongs to exactly one of these five.',
  syntax: pre(`-- ══ 1. DDL — Data Definition Language ═══════════════════════════════════
-- Defines or MODIFIES DATABASE STRUCTURE (schema objects, not rows).
-- ⚠ KEY RULE: DDL auto-commits immediately — it CANNOT be rolled back.

CREATE   -- create a new object
         CREATE DATABASE   db_name
         CREATE TABLE      table_name (col definitions, constraints)
         CREATE INDEX      idx_name ON table(col)
         CREATE VIEW       view_name AS SELECT ...
         CREATE PROCEDURE  proc_name() BEGIN ... END
         CREATE FUNCTION   fn_name() RETURNS type BEGIN ... END
         CREATE TRIGGER    trg_name BEFORE|AFTER event ON table FOR EACH ROW
         CREATE EVENT      evt_name ON SCHEDULE ... DO ...
         CREATE USER       'user'@'host' IDENTIFIED BY 'pwd'

ALTER    -- modify an existing object without dropping it
         ALTER TABLE  (ADD|DROP|MODIFY COLUMN, ADD CONSTRAINT, ADD INDEX ...)
         ALTER USER   'user'@'host' IDENTIFIED BY 'newpwd'

DROP     -- permanently destroy an object AND all its data
         DROP DATABASE | TABLE | VIEW | INDEX
         DROP PROCEDURE | FUNCTION | TRIGGER | EVENT | USER

TRUNCATE -- remove ALL rows instantly; resets AUTO_INCREMENT
         TRUNCATE TABLE table_name
         -- Classified as DDL (auto-commits) despite removing rows

RENAME   -- rename a table
         RENAME TABLE old_name TO new_name

-- ══ 2. DML — Data Manipulation Language ══════════════════════════════════
-- Manipulates ROWS inside tables (not structure).
-- ✅ KEY RULE: DML participates in transactions → can be ROLLBACK-ed.

INSERT   -- add new rows
         INSERT INTO table (col1, col2) VALUES (v1, v2), (v3, v4);
         INSERT INTO table SELECT ...;           -- from another table

UPDATE   -- modify existing rows
         UPDATE table SET col1 = val1 WHERE condition;

DELETE   -- remove specific rows (logged, triggers fire, can rollback)
         DELETE FROM table WHERE condition;

REPLACE  -- DELETE matching unique key row, then INSERT anew (upsert)
         REPLACE INTO table (cols) VALUES (...);

-- ══ 3. DQL — Data Query Language ════════════════════════════════════════
-- READS data. Read-only — never modifies any row or structure.
-- Note: many sources fold DQL into DML; treating it separately is cleaner.

SELECT   -- retrieve rows from one or more tables / views / subqueries
  SELECT  col_list | * | expressions | aggregates
  FROM    table | subquery | view
  [JOIN   type JOIN table ON condition]   -- INNER / LEFT / RIGHT / CROSS
  [WHERE  row-level filter]
  [GROUP BY grouping_columns]
  [HAVING group-level filter]             -- post-aggregation WHERE
  [ORDER BY col ASC|DESC]
  [LIMIT  n OFFSET m];                   -- pagination

-- ══ 4. DCL — Data Control Language ══════════════════════════════════════
-- Controls ACCESS PERMISSIONS on the server, database, or table level.
-- ⚠ KEY RULE: DCL auto-commits — cannot be rolled back.

GRANT    -- give one or more privileges to a user
         GRANT ALL PRIVILEGES   ON *.*           TO 'dba'@'localhost';
         GRANT SELECT, INSERT   ON db.*          TO 'app'@'%';
         GRANT SELECT           ON db.view_name  TO 'analyst'@'localhost';
         GRANT EXECUTE          ON PROCEDURE db.proc TO 'user'@'%';

REVOKE   -- remove privileges from a user
         REVOKE DELETE ON db.* FROM 'user'@'host';

-- ══ 5. TCL — Transaction Control Language ════════════════════════════════
-- Manages TRANSACTION BOUNDARIES that wrap DML statements.
-- ⚠ Only DML participates in TCL. DDL/DCL auto-commit and ignore transactions.

START TRANSACTION  -- begin a transaction block (alias: BEGIN)
COMMIT             -- permanently persist all DML changes since START TRANSACTION
ROLLBACK           -- undo ALL DML changes since START TRANSACTION

SAVEPOINT name              -- create a named checkpoint inside a transaction
ROLLBACK TO SAVEPOINT name  -- undo back to that checkpoint only
RELEASE SAVEPOINT name      -- delete a savepoint (cannot rollback to it after)`),
  example: pre(`-- Every TechMart operation maps to exactly one SQL category

-- ─── DDL — shaping the database structure ─────────────────────────────
CREATE DATABASE techmart;                         -- Topics 01 → structure
CREATE TABLE customers (id INT PRIMARY KEY ...);  -- Topic 03 → structure
ALTER  TABLE customers ADD COLUMN loyalty INT;    -- Topic 22 → structure change
CREATE INDEX idx_email ON customers(email);       -- Topic 16 → structure change
TRUNCATE TABLE order_items;                       -- wipe rows (DDL, auto-commits!)
DROP   TABLE IF EXISTS temp_staging;              -- Topic N → structure removal

-- ─── DML — writing rows ───────────────────────────────────────────────
INSERT INTO customers (name, email, city)
  VALUES ('Alice Johnson', 'alice@mail.com', 'New York');   -- Topic 05

UPDATE products SET price = 1899.99 WHERE id = 1;           -- Topic 09

DELETE FROM orders WHERE status = 'cancelled'
  AND created_at < DATE_SUB(NOW(), INTERVAL 1 YEAR);        -- Topic 10

REPLACE INTO products (id, name, price)
  VALUES (1, 'MacBook Pro M4', 1899.99);   -- deletes id=1 then re-inserts

-- ─── DQL — reading data ───────────────────────────────────────────────
SELECT c.name, COUNT(o.id) AS orders, SUM(o.total) AS revenue
FROM   customers c
LEFT JOIN orders o ON c.id = o.customer_id
WHERE  o.status IN ('delivered','shipped')
GROUP  BY c.id, c.name
HAVING SUM(o.total) > 500
ORDER  BY revenue DESC
LIMIT  10;                                                   -- Topics 06–14

-- ─── DCL — controlling access ─────────────────────────────────────────
GRANT  SELECT, INSERT, UPDATE ON techmart.* TO 'app_user'@'%';  -- Topic 27
REVOKE UPDATE ON techmart.products FROM 'app_user'@'%';

-- ─── TCL — transaction boundaries ────────────────────────────────────
START TRANSACTION;                                           -- Topic 17
  INSERT INTO orders (customer_id, total) VALUES (1, 2249.98);
  INSERT INTO order_items (order_id, product_id, quantity, price)
    VALUES (LAST_INSERT_ID(), 1, 1, 1999.99);
  UPDATE products SET stock = stock - 1 WHERE id = 1;
COMMIT;   -- all 3 DML statements succeed together or all ROLLBACK together

-- ─── Quick reference: which commands belong where ─────────────────────
-- DDL → CREATE, ALTER, DROP, TRUNCATE, RENAME
-- DML → INSERT, UPDATE, DELETE, REPLACE
-- DQL → SELECT (and all its clauses)
-- DCL → GRANT, REVOKE
-- TCL → START TRANSACTION, COMMIT, ROLLBACK, SAVEPOINT, RELEASE SAVEPOINT`),
  uc:"<strong>Real-world:</strong> Every database migration tool (Flyway, Liquibase, Rails ActiveRecord) categorizes scripts by type: DDL migrations run in their own step and auto-commit (can't undo on failure), DML data fixes run inside transactions (rolled back cleanly on error). AWS RDS IAM database authentication maps to DCL. During production incidents, the first question a DBA asks is 'was this DDL or DML?' — because only DML can be rolled back."
},
{
  id:1, g:'Foundations', emoji:'🗄️', title:'CREATE DATABASE',
  def:'A database is a named container that organizes all related tables, views, and objects — the top-level structure in MySQL before anything else can be created.',

  example: pre(`-- ① TechMart: every subsequent topic builds on this one step

{
  id:2, g:'Foundations', emoji:'📊', title:'Data Types',
  def:'Data types define what kind of value a column can store — choosing correctly prevents bugs, saves storage, and makes comparisons accurate.',
  syntax: pre(`-- ── NUMERIC ──────────────────────────────────
TINYINT          -- -128 to 127  (1 byte)
INT              -- ±2.1 billion (4 bytes)
BIGINT           -- very large integers
DECIMAL(m, d)    -- exact decimal, m digits, d after point ← use for money
FLOAT / DOUBLE   -- approximate (avoid for money!)

-- ── TEXT ──────────────────────────────────────
VARCHAR(n)       -- variable length, max n chars (up to 65535)
CHAR(n)          -- fixed length, padded with spaces
TEXT             -- up to 65 KB
LONGTEXT         -- up to 4 GB

-- ── DATE & TIME ───────────────────────────────
DATE             -- YYYY-MM-DD
DATETIME         -- YYYY-MM-DD HH:MM:SS
TIMESTAMP        -- auto-updates on row write
TIME             -- HH:MM:SS

-- ── OTHER ─────────────────────────────────────
BOOLEAN          -- stored as TINYINT(1): 1=TRUE, 0=FALSE
ENUM('a','b')    -- one value from a fixed list
JSON             -- store and query JSON documents`),
  example: pre(`-- TechMart: deliberate type choices for each column

-- ✅ DECIMAL for money (no floating-point errors)
price DECIMAL(10, 2)   -- e.g. 1999.99  (10 digits, 2 decimal)

-- ❌ FLOAT loses precision
price FLOAT            -- 0.1 + 0.2 = 0.30000000000000004 ← bug!

-- ✅ ENUM for fixed statuses (validated at DB level)

-- ✅ VARCHAR for names (saves space vs CHAR)
name VARCHAR(100)      -- uses only the space needed

-- ✅ DATETIME for order timestamps (not TIMESTAMP — avoids 2038 bug)

-- ✅ BOOLEAN for flags
is_active BOOLEAN DEFAULT TRUE  -- stored as 0/1`),
  uc:'<strong>Real-world:</strong> Banks mandate DECIMAL for all monetary values. PayPal stores amounts as integer cents in BIGINT to completely eliminate decimal math. MySQL ENUM enforces shipment status values — no typo like <em>"shiped"</em> can ever enter the database.'
},
{
  id:3, g:'Foundations', emoji:'🏗️', title:'CREATE TABLE & Constraints',
  def:'CREATE TABLE defines a table\'s column names, types, and rules (constraints) that MySQL enforces automatically — the skeleton of your data model.',
  syntax: pre(`CREATE TABLE table_name (
  col_name  DATATYPE  [constraint ...],
  ...
  [table-level constraints]
);

-- Column-level constraints
NOT NULL                 -- value is mandatory
UNIQUE                   -- no duplicate values
DEFAULT value            -- fallback when not supplied
CHECK (expression)       -- custom validation rule
AUTO_INCREMENT           -- auto-number (INT PKs only)
PRIMARY KEY              -- shorthand on single column

-- Table-level constraints (span multiple columns)

  example: pre(`-- ② TechMart: create all 4 tables — used in EVERY topic from here on

{
  id:17, g:'Reliability', emoji:'🔐', title:'Transactions',
  def:'A Transaction wraps multiple SQL statements into a single atomic unit — all succeed together or all are rolled back, protecting data from partial updates.',

  -- Any SQL here is not yet committed
  INSERT ...;
  UPDATE ...;
  DELETE ...;

-- OR, on error:
ROLLBACK;              -- undo everything back to START

-- Partial undo with savepoints

  -- more SQL...

COMMIT;                     -- commit remaining changes`),
  example: pre(`-- ⑯ TechMart: atomic order placement

-- All 3 steps succeed together, or none do
START TRANSACTION;

  -- Step 1: create the order record
  INSERT INTO orders (customer_id, total, status)
  VALUES (3, 149.98, 'pending');

  -- Step 2: add line items
  INSERT INTO order_items (order_id, product_id, quantity, price)
  VALUES (LAST_INSERT_ID(), 5, 2, 149.98);

  -- Step 3: deduct stock
  UPDATE products
  SET stock = stock - 2
  WHERE id = 5;

COMMIT;   -- ✅ all 3 rows committed atomically

-- ─────────────────────────────────────────────
-- Demonstrating ROLLBACK on error scenario
START TRANSACTION;

  UPDATE products SET stock = stock - 500 WHERE id = 1;
  -- Oops, MacBook stock would go negative → illegal

ROLLBACK;    -- stock reverts to original value

-- ─────────────────────────────────────────────
-- Savepoint example: partially commit
START TRANSACTION;
  INSERT INTO orders (customer_id, total) VALUES (2, 999.99);
  SAVEPOINT after_order;

  INSERT INTO order_items (order_id, product_id, quantity, price)
  VALUES (LAST_INSERT_ID(), 99, 1, 999.99);  -- product 99 doesn't exist
  ROLLBACK TO SAVEPOINT after_order;          -- undo only the bad insert

  -- Fix and retry the item insert correctly
  INSERT INTO order_items (order_id, product_id, quantity, price)
  VALUES (LAST_INSERT_ID(), 2, 1, 999.99);
COMMIT;`),
  uc:"<strong>Real-world:</strong> Every bank wire transfer runs inside a transaction: debit source account, credit destination account. If the credit fails (network timeout), the ROLLBACK restores the debit — money never disappears. PayPal processes 25M+ such transactions daily."

{
  id:18, g:'Reliability', emoji:'🧱', title:'ACID Properties',
  def:'ACID is the four-property contract that makes database transactions trustworthy — the foundation that separates production databases from simple file storage.',
  acid: true,
  syntax: pre(`-- MySQL's default engine InnoDB provides full ACID
SHOW ENGINES;
-- InnoDB: Transactions=YES, XA=YES, Savepoints=YES ← use this

-- Isolation levels (higher = safer but slower)
-- READ UNCOMMITTED → can read uncommitted changes (dirty reads)
-- READ COMMITTED   → only reads committed data
-- REPEATABLE READ  → same query returns same data (MySQL default)
-- SERIALIZABLE     → fully sequential, maximum isolation

-- View current isolation level
SHOW VARIABLES LIKE 'transaction_isolation';

-- Change for current session
SET SESSION TRANSACTION ISOLATION LEVEL REPEATABLE READ;`),
  example: pre(`-- ⑰ TechMart: each ACID property in practice

-- ATOMICITY: entire order fails or succeeds as one unit
START TRANSACTION;
  INSERT INTO orders ...;          -- step 1
  INSERT INTO order_items ...;     -- step 2
  UPDATE products SET stock-=1 ...; -- step 3
COMMIT;
-- If server crashes after step 2 → all 3 are rolled back ✓

-- CONSISTENCY: CHECK constraint blocks invalid data
-- INSERT INTO products (price) VALUES (-50); → ERROR!
-- CHECK (price > 0) never lets bad state enter ✓

-- ISOLATION: two buyers hit last MacBook simultaneously
-- Transaction A:  reads stock=1, deducts to 0, not yet committed
-- Transaction B:  reads stock=1 (REPEATABLE READ snapshot)
-- Transaction A:  COMMIT → stock is now 0
-- Transaction B:  attempts deduct → CHECK fails or sees stock=0 ✓
-- Result: only one buyer gets it ✓

-- DURABILITY: after COMMIT the data survives a crash
-- InnoDB writes to the redo log (WAL) before confirming COMMIT
-- On restart: uncommitted = rolled back, committed = replayed ✓`),
  uc:"<strong>Real-world:</strong> Visa processes 65,000 transactions/second — every one ACID-compliant. Without Durability, a datacenter power cut would lose confirmed payments. Without Isolation, two people could simultaneously buy the last seat on a flight."
},
{
  id:19, g:'DB Objects', emoji:'⚙️', title:'Stored Procedures',

  syntax: pre(`DELIMITER $$
CREATE PROCEDURE proc_name (
  IN  param1 DATATYPE,     -- input parameter
  OUT param2 DATATYPE,     -- output parameter
  INOUT param3 DATATYPE    -- input and output
)
BEGIN

END $$

-- Invoke

  example: pre(`-- ⑱ TechMart: stored procedure for placing orders safely

DELIMITER $$
CREATE PROCEDURE place_order(
  IN  p_customer_id INT,
  IN  p_product_id  INT,
  IN  p_quantity    INT,
  OUT p_order_id    INT,
  OUT p_message     VARCHAR(200)
)
BEGIN
  DECLARE v_price DECIMAL(10,2);
  DECLARE v_stock INT;

  -- Fetch product info
  SELECT price, stock INTO v_price, v_stock
  FROM products WHERE id = p_product_id;

  IF v_stock IS NULL THEN
    SET p_message = 'ERROR: Product not found';
    SET p_order_id = 0;

  ELSEIF v_stock < p_quantity THEN
    SET p_message = CONCAT('ERROR: Only ', v_stock, ' in stock');
    SET p_order_id = 0;

  ELSE
    START TRANSACTION;
      INSERT INTO orders (customer_id, total, status)
      VALUES (p_customer_id, v_price * p_quantity, 'pending');
      SET p_order_id = LAST_INSERT_ID();

      INSERT INTO order_items (order_id, product_id, quantity, price)
      VALUES (p_order_id, p_product_id, p_quantity, v_price);

      UPDATE products SET stock = stock - p_quantity
      WHERE id = p_product_id;
    COMMIT;
    SET p_message = CONCAT('Order #', p_order_id, ' placed!');
  END IF;
END $$
DELIMITER ;

-- Bob orders 1 iPhone
CALL place_order(2, 2, 1, @oid, @msg);
SELECT @oid AS order_id, @msg AS result;

-- Alice tries to order 500 MacBooks (only 14 left)
CALL place_order(1, 1, 500, @oid, @msg);
SELECT @oid, @msg;   -- ERROR: Only 14 in stock`),
  uc:"<strong>Real-world:</strong> Banking systems wrap loan disbursement in stored procedures — one CALL handles debit, credit, fee ledger, audit log, and notification flag. Logic lives in the DB, not scattered across 12 application servers with inconsistent versions."

{
  id:20, g:'DB Objects', emoji:'🎯', title:'Triggers',
  def:'A Trigger is SQL that MySQL executes automatically BEFORE or AFTER an INSERT, UPDATE, or DELETE — enforcing rules and capturing history without application code.',
  syntax: pre(`DELIMITER $$
CREATE TRIGGER trigger_name
  [BEFORE | AFTER] [INSERT | UPDATE | DELETE]
  ON table_name
  FOR EACH ROW
BEGIN
  -- NEW.col = new value  (INSERT, UPDATE)
  -- OLD.col = old value  (UPDATE, DELETE)

-- Drop a trigger

  example: pre(`-- ⑲ TechMart: auto-maintain data integrity

-- Trigger 1: auto-recalculate order.total when an item is added
DELIMITER $$
CREATE TRIGGER trg_recalc_total
  AFTER INSERT ON order_items
  FOR EACH ROW
BEGIN
  UPDATE orders
  SET total = (
    SELECT SUM(quantity * price)
    FROM order_items
    WHERE order_id = NEW.order_id
  )
  WHERE id = NEW.order_id;
END $$
DELIMITER ;

-- Test: insert a new item → total updates automatically
INSERT INTO order_items (order_id, product_id, quantity, price)
VALUES (3, 4, 1, 249.99);
SELECT id, total FROM orders WHERE id = 3;   -- total updated!

-- Trigger 2: audit log for every product price change
CREATE TABLE price_audit (
  id         INT AUTO_INCREMENT PRIMARY KEY,
  product_id INT,
  old_price  DECIMAL(10,2),
  new_price  DECIMAL(10,2),
  changed_at DATETIME DEFAULT NOW()
);

DELIMITER $$
CREATE TRIGGER trg_price_audit
  AFTER UPDATE ON products
  FOR EACH ROW
BEGIN
  IF OLD.price != NEW.price THEN
    INSERT INTO price_audit (product_id, old_price, new_price)
    VALUES (NEW.id, OLD.price, NEW.price);
  END IF;
END $$
DELIMITER ;

-- Change MacBook price → audit row auto-inserted
UPDATE products SET price = 1899.99 WHERE id = 1;
SELECT * FROM price_audit;   -- shows old: 1999.99, new: 1899.99`),
  uc:"<strong>Real-world:</strong> HIPAA-regulated healthcare databases use AFTER UPDATE triggers to write immutable audit trails whenever patient records change. Stripe uses triggers to maintain denormalized balance totals that power its real-time dashboard without a full aggregation query."

{
  id:21, g:'Design', emoji:'📐', title:'Normalization',
  def:'Normalization organizes tables to eliminate redundancy and anomalies — following Normal Forms (NF) ensures updates, inserts, and deletes stay consistent.',
  normalization: true,
  syntax: pre(`-- 1NF: atomic cells, no repeating groups, rows are unique
-- 2NF: every non-key column depends on the WHOLE PK (no partial dependency)
-- 3NF: no non-key column depends on another non-key column (no transitive)

-- BCNF: stricter 3NF — every determinant is a candidate key
-- 4NF: no multi-valued dependencies
-- 5NF: no join dependencies (rarely needed in practice)

-- Denormalization: intentionally violate NF for read performance
--   (used in data warehouses, analytics, caching layers)`),
  example: pre(`-- ⑳ TechMart: why our schema IS normalized

-- ❌ BAD — everything in one table (unnormalized):
-- | order_id | cust_name | cust_email       | prod1      | prod2    |
-- | 1        | Alice     | alice@mail.com   | MacBook    | AirPods  |
-- | 2        | Alice     | alice@mail.com   | iPad       | NULL     |
-- Problems:
--   • cust_email stored twice — update anomaly
--   • prod1/prod2 columns — can't handle 3+ products
--   • Deleting order 2 loses Alice's email entirely (deletion anomaly)
--   • Can't INSERT a product without an order (insertion anomaly)

-- ✅ TechMart = 3NF:
-- customers(id, name, email, city)      ← 1 row per customer
-- products(id, name, category, price)   ← 1 row per product
-- orders(id, customer_id, total)        ← 1 row per order
-- order_items(id, order_id, product_id, quantity, price)

-- 1NF ✓: every cell is atomic; no repeating groups; PK on each table
-- 2NF ✓: order_items.price depends on BOTH order_id+product_id (the PK)
--         not on just one of them
-- 3NF ✓: customer.city is NOT stored in orders — it lives in customers
--         so no transitive dependency (order_id → customer_id → city)

-- Benefit: Alice changes email ONCE
UPDATE customers SET email = 'alice@new.com' WHERE id = 1;
-- All 2 orders automatically reflect it via JOIN — zero data duplication`),
  uc:"<strong>Real-world:</strong> Wikipedia's database is in 3NF — articles, authors, categories, and revisions are separate tables. Renaming a category touches 1 row, not millions of articles. Analytics systems (Snowflake, Redshift) deliberately use star-schema denormalization for read speed — trading write efficiency for query performance."
},

{
  id:24, g:'Functions', emoji:'📅', title:'Date & Time Functions',
  def:'Date/Time functions let you extract, compare, format, and arithmetic-shift temporal values — critical for reports, retention analysis, SLA tracking, and any time-based query.',

CURDATE()                    -- current date: '2025-01-15'

YEAR(d) / MONTH(d) / DAY(d) -- extract parts

  example: pre(`-- ㉓ TechMart: time-based queries across all tables

-- How many days ago each order was placed
SELECT
  id,
  created_at,
  DATEDIFF(NOW(), created_at)            AS days_ago,
  DATE_FORMAT(created_at, '%d %M %Y')   AS friendly_date
FROM orders;

SELECT
  DATE_FORMAT(created_at, '%Y-%m')      AS month,
  COUNT(*)                              AS orders,
  SUM(total)                            AS revenue
FROM orders
GROUP BY DATE_FORMAT(created_at, '%Y-%m')
ORDER BY month;

-- Customer tenure (how long since they joined)
SELECT
  name,
  created_at                            AS joined,
  TIMESTAMPDIFF(DAY,  created_at, NOW()) AS days_as_customer,
  TIMESTAMPDIFF(MONTH,created_at, NOW()) AS months_as_customer
FROM customers;

-- Orders placed in the last 30 days
SELECT id, total, status FROM orders
WHERE created_at >= DATE_SUB(NOW(), INTERVAL 30 DAY);

-- Late orders: pending for more than 3 days
SELECT id, customer_id, created_at
FROM orders
WHERE status = 'pending'
  AND created_at < DATE_SUB(NOW(), INTERVAL 3 DAY);

-- Revenue by day of week (which day sells most?)
SELECT
  DAYNAME(created_at)                   AS day_of_week,
  COUNT(*)                              AS orders,
  SUM(total)                            AS revenue

{
  id:25, g:'Advanced Queries', emoji:'🪟', title:'Window Functions',
  def:'Window Functions compute values across a set of rows related to the current row (a "window") without collapsing them into one group — enabling rankings, running totals, and row comparisons inside a single SELECT.',
  syntax: pre(`function_name() OVER (
  [PARTITION BY col]     -- like GROUP BY but keeps all rows
  [ORDER BY col]         -- defines row order within the window
  [ROWS/RANGE frame]     -- optional sliding frame
)

-- Ranking
ROW_NUMBER()   -- unique sequential number (no ties)
RANK()         -- tied rows share rank, next rank skips
DENSE_RANK()   -- tied rows share rank, no skip

-- Value
FIRST_VALUE(col)  -- first value in the window
LAST_VALUE(col)   -- last value in the window
LAG(col, n)       -- col value from n rows BEFORE current
LEAD(col, n)      -- col value from n rows AFTER current
NTH_VALUE(col, n) -- nth row in the window

-- Aggregate as window (non-collapsing)
SUM(col)  OVER (PARTITION BY x ORDER BY y)   -- running total
AVG(col)  OVER (PARTITION BY x)              -- per-group avg on every row
COUNT(*)  OVER ()                            -- total rows in result`),
  example: pre(`-- ㉔ TechMart: analytics without collapsing rows

-- Rank products by price within each category
SELECT
  name,
  category,
  price,
  RANK()       OVER (PARTITION BY category ORDER BY price DESC) AS price_rank,
  DENSE_RANK() OVER (PARTITION BY category ORDER BY price DESC) AS dense_rank,
  ROW_NUMBER() OVER (PARTITION BY category ORDER BY price DESC) AS row_num
FROM products;

-- Running total of revenue (cumulative)
SELECT
  id           AS order_id,
  created_at,
  total,
  SUM(total) OVER (ORDER BY created_at)         AS running_revenue,
  AVG(total) OVER (ORDER BY created_at
                   ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS moving_avg_3
FROM orders
ORDER BY created_at;

-- Compare each order to the customer's own average
SELECT
  c.name,
  o.id         AS order_id,
  o.total,
  ROUND(AVG(o.total) OVER (PARTITION BY o.customer_id), 2) AS cust_avg,
  o.total - AVG(o.total) OVER (PARTITION BY o.customer_id) AS vs_their_avg
FROM orders o
JOIN customers c ON o.customer_id = c.id;

-- Previous order amount per customer (LAG)
SELECT
  customer_id,
  id           AS order_id,
  created_at,
  total,
  LAG(total, 1) OVER (PARTITION BY customer_id ORDER BY created_at) AS prev_order_total,
  total - LAG(total,1) OVER (PARTITION BY customer_id ORDER BY created_at) AS change
FROM orders;`),
  uc:"<strong>Real-world:</strong> Spotify's Wrapped uses DENSE_RANK() OVER (PARTITION BY user_id ORDER BY play_count DESC) to find each user's top artists. Financial platforms show running P&L with SUM(amount) OVER (ORDER BY date) — a running total impossible to express cleanly without window functions."

{
  id:26, g:'Advanced Queries', emoji:'🌀', title:'CTEs (WITH Clause)',
  def:'A Common Table Expression (CTE) is a named temporary result set defined with WITH — it makes complex multi-step queries readable, reusable within the query, and supports recursion for hierarchical data.',
  syntax: pre(`-- Basic CTE
WITH cte_name AS (
  SELECT ...          -- the CTE query
)
SELECT * FROM cte_name;   -- reference it like a table

-- Multiple CTEs (chain them)
WITH
  cte1 AS (SELECT ...),
  cte2 AS (SELECT ... FROM cte1)   -- can reference prior CTEs
SELECT * FROM cte2;

-- Recursive CTE (for trees, hierarchies, sequences)
WITH RECURSIVE cte_name AS (
  SELECT ...           -- anchor: base case (non-recursive)
  UNION ALL
  SELECT ...           -- recursive: references cte_name itself
  FROM cte_name
  WHERE stop_condition
)
SELECT * FROM cte_name;`),
  example: pre(`-- ㉕ TechMart: clean multi-step analysis with CTEs

-- Step 1: who are the high-value customers?
-- Step 2: what did they buy?
-- Without CTE: a nested subquery nightmare. With CTE: crystal clear.

WITH high_value_customers AS (
  SELECT customer_id, SUM(total) AS lifetime_value
  FROM orders
  GROUP BY customer_id
  HAVING SUM(total) > 1000
),
customer_details AS (
  SELECT c.id, c.name, c.city, hvc.lifetime_value
  FROM customers c
  JOIN high_value_customers hvc ON c.id = hvc.customer_id
)
SELECT
  cd.name,
  cd.city,
  cd.lifetime_value,
  p.name          AS product_bought,
  oi.quantity
FROM customer_details cd
JOIN orders o       ON cd.id        = o.customer_id
JOIN order_items oi ON o.id         = oi.order_id
JOIN products p     ON oi.product_id = p.id
ORDER BY cd.lifetime_value DESC, p.name;

-- Recursive CTE: generate a sequence 1–6 (one per product)
WITH RECURSIVE counter AS (
  SELECT 1 AS n            -- anchor
  UNION ALL
  SELECT n + 1 FROM counter WHERE n < 6  -- recursive step
)
SELECT c.n, p.name, p.price
FROM counter c
JOIN products p ON p.id = c.n;

-- Recursive CTE: category breadcrumb (self-referencing hierarchy)

--   FROM categories c JOIN breadcrumb b ON c.parent_id = b.id
-- )
-- SELECT * FROM breadcrumb;`),
  uc:"<strong>Real-world:</strong> GitHub uses recursive CTEs to resolve nested organization hierarchies — an enterprise org can have teams within teams within teams. Accounting systems use chained CTEs to implement multi-step GL reconciliation that would otherwise require temp tables or application-layer loops."

{
  id:27, g:'Administration', emoji:'👤', title:'User Management & Privileges',
  def:'MySQL\'s privilege system controls who can connect, which databases they can access, and what operations they can perform — the security layer protecting every production database.',
  syntax: pre(`-- Create a user (host restricts connection source)

-- host: 'localhost' = local only | '%' = any host | '10.0.0.%' = subnet

-- Grant privileges
GRANT privilege ON scope TO 'user'@'host';

-- Show what a user can do

-- Revoke privileges
REVOKE privilege ON scope FROM 'user'@'host';

-- Apply changes immediately (usually auto-applied)
FLUSH PRIVILEGES;

-- Delete a user
DROP USER 'user'@'host';

-- Change password
ALTER USER 'user'@'host' IDENTIFIED BY 'newpassword';`),

{
  id:30, g:'Advanced Queries', emoji:'🔦', title:'Full-Text Search',
  def:'Full-Text Search indexes every word in text columns, enabling natural-language keyword search across millions of rows in milliseconds — far faster and smarter than LIKE \'%keyword%\'.',
  syntax: pre(`-- 1. Create a FULLTEXT index (InnoDB table required)
ALTER TABLE table ADD FULLTEXT INDEX ft_idx (col1, col2);

-- 2. Search with MATCH ... AGAINST
MATCH(col1, col2) AGAINST('search terms')

-- Modes:
-- Natural language (default): relevance-ranked results

-- Boolean: supports +required -excluded "exact phrase" wildcards
AGAINST('+macbook -refurbished' IN BOOLEAN MODE)
AGAINST('"air pods"'            IN BOOLEAN MODE)   -- exact phrase
AGAINST('mac*'                  IN BOOLEAN MODE)   -- prefix wildcard

-- Query expansion: expands search based on top results (disambiguation)

  name,
  category,
  price,

FROM products

ORDER BY relevance DESC;
-- Returns: MacBook Pro (highest score), iPad Air, etc.

-- ③ Boolean mode: must have 'air', must NOT have 'iPad'

WHERE MATCH(name, category)
      AGAINST('+Air -iPad' IN BOOLEAN MODE);
-- Returns: AirPods Pro (has "Air", not "iPad")

-- ④ Prefix search: any product starting with 'mac'

{
  id:31, g:'Combining Results', emoji:'🔀', title:'UNION & UNION ALL',
  def:'UNION stacks rows from two or more SELECT queries vertically into one result set — UNION removes duplicate rows (slower), UNION ALL keeps every row including duplicates (faster and usually preferred).',
  syntax: pre(`-- Stack two result sets (columns must match in number and compatible types)
SELECT col1, col2 FROM table1
UNION [ALL]
SELECT col1, col2 FROM table2;

-- Rules:
-- 1. Both SELECT must return the same number of columns
-- 2. Column names in the result come from the FIRST SELECT
-- 3. Data types should be compatible (MySQL coerces if needed)
-- 4. ORDER BY applies to the FINAL result — place it at the very end
-- 5. UNION removes duplicates (adds a sort/hash step — slower)
--    UNION ALL skips deduplication — always prefer unless duplicates are a problem

-- Multiple sets chained
SELECT ... UNION ALL SELECT ... UNION ALL SELECT ...;

-- Using aliases from first SELECT for ORDER BY
SELECT name AS item, price FROM products
UNION ALL
SELECT CONCAT('Order #', id), total FROM orders
ORDER BY price DESC;`),

ORDER BY id;
-- Same as: WHERE status IN ('shipped','delivered') — but UNION shines
-- when the two queries hit DIFFERENT tables or have very different WHERE logic

-- 2. Unified contact list: customers + a fixed support entry

GROUP BY p.id ORDER BY SUM(oi.quantity) DESC LIMIT 1;

-- 4. UNION (without ALL) — remove duplicates
-- Find customers who live in cities that ALSO have deliveries
SELECT city FROM customers

{
  id:32, g:'Combining Results', emoji:'🔀', title:'CASE WHEN — Conditional Logic',
  def:'CASE WHEN is SQL\'s if/else — it evaluates conditions row by row and returns a value, enabling data transformation, custom labels, conditional aggregation, and dynamic sorting directly inside a query.',
  syntax: pre(`-- ── Searched CASE (most powerful — any condition) ──────────────
CASE
  WHEN condition1 THEN result1
  WHEN condition2 THEN result2
  ...
  ELSE default_result          -- ELSE is optional; NULL returned if omitted
END

-- ── Simple CASE (equality checks only) ──────────────────────────

  WHEN value2 THEN result2
  ELSE default
END

-- ── Where CASE can appear ────────────────────────────────────────

  example: pre(`-- ㉛ TechMart: conditional logic across every context

{
  id:33, g:'Combining Results', emoji:'⬜', title:'NULL Handling — COALESCE · IFNULL · NULLIF',
  def:'NULL means "unknown" or "missing" — not zero, not empty string — and follows three-valued logic (TRUE/FALSE/NULL) that makes standard comparison operators fail silently, requiring dedicated NULL-aware functions.',
  syntax: pre(`-- ── What NULL is and is NOT ─────────────────────────────────────
-- NULL = unknown value. It propagates through ALL operations:
-- NULL = NULL   → NULL  (not TRUE! use IS NULL)
-- NULL != NULL  → NULL  (not TRUE!)
-- NULL + 5      → NULL
-- NULL || 'x'   → NULL
-- COUNT(col)    skips NULLs; COUNT(*) includes them

-- ── Checking for NULL ────────────────────────────────────────────
WHERE col IS NULL          -- ✅ correct
WHERE col IS NOT NULL      -- ✅ correct
WHERE col = NULL           -- ❌ always returns NULL (no rows matched!)
WHERE col != NULL          -- ❌ same problem

-- ── IFNULL(expr, fallback) ───────────────────────────────────────
-- Returns fallback if expr IS NULL, otherwise returns expr (MySQL-specific)
IFNULL(phone, 'No phone')        -- if phone is NULL → 'No phone'
IFNULL(discount_pct, 0)          -- if NULL → 0

-- ── COALESCE(a, b, c, ...) ───────────────────────────────────────
-- Returns FIRST non-NULL value from the list (ANSI SQL standard)
COALESCE(phone, mobile, email, 'No contact')   -- tries each in order
COALESCE(discount_pct, category_discount, 0)   -- fallback chain

-- ── NULLIF(a, b) ─────────────────────────────────────────────────
-- Returns NULL if a = b, otherwise returns a
-- Primary use: prevent division by zero
NULLIF(denominator, 0)           -- if denom = 0 → NULL (instead of error)
total / NULLIF(quantity, 0)      -- safe division

-- ── NULL in aggregates ────────────────────────────────────────────
COUNT(*)         -- counts ALL rows including NULLs
COUNT(col)       -- counts only non-NULL values in col
SUM(col)         -- ignores NULLs (NULL treated as zero in the sum)
AVG(col)         -- denominator = rows with non-NULL col only`),
  example: pre(`-- ㉜ TechMart: handling missing and unknown data

-- 1. Find customers who have no phone number on file
SELECT name, email FROM customers
WHERE phone_number IS NULL;

-- 2. Display 'Not provided' instead of NULL for missing phones
SELECT
  name,
  IFNULL(phone_number, 'Not provided')     AS phone,
  COALESCE(city, 'Unknown city')           AS city
FROM customers;

-- 3. Safe division: conversion rate (avoid divide-by-zero)
-- If a product was viewed 0 times, NULLIF converts 0→NULL so division returns NULL
SELECT
  name,
  views,
  orders_from_product,
  ROUND(
    orders_from_product / NULLIF(views, 0) * 100, 2
  )                                        AS conversion_rate_pct
FROM product_metrics;

-- 4. COALESCE: pick first available delivery address
SELECT
  o.id,
  COALESCE(o.delivery_address, c.city, 'Address unknown') AS ship_to
FROM orders o
JOIN customers c ON o.customer_id = c.id;

-- 5. NULL in aggregates — the difference matters
SELECT
  COUNT(*)                               AS total_products,    -- 6
  COUNT(specs)                           AS products_with_specs, -- only those with JSON
  COUNT(discount_pct)                    AS products_discounted,
  AVG(discount_pct)                      AS avg_discount_where_set,
  -- AVG ignores NULLs: only averages rows where discount_pct IS NOT NULL
  IFNULL(AVG(discount_pct), 0)          AS avg_discount_incl_zeros
FROM products;

-- 6. NULLIF to blank out sentinel values from legacy data
-- Some old records used -1 to mean "no stock data"
SELECT
  name,
  NULLIF(stock, -1)                      AS stock_clean
FROM products;
-- -1 → NULL instead of showing misleading negative stock`),
  uc:"<strong>Real-world:</strong> Salesforce's CRM handles thousands of optional fields — COALESCE picks the first populated field for display (mobile → work phone → home phone → 'No number'). Airbnb's pricing uses NULLIF to safely compute occupancy rates: bookings / NULLIF(available_nights, 0). ETL pipelines at LinkedIn use extensive NULL checks because source data from legacy systems uses NULL, 0, empty string, and 'N/A' inconsistently — the first normalization step is always NULL-handling."
},
{
  id:34, g:'Reliability', emoji:'🔒', title:'Locking & Deadlocks',
  def:'MySQL uses row-level locks to prevent concurrent transactions from corrupting shared data; a deadlock occurs when two transactions each hold a lock the other needs — InnoDB detects and resolves this within milliseconds by rolling back one transaction.',
  syntax: pre(`-- ── Lock types ──────────────────────────────────────────────────
-- Shared (S) lock: multiple transactions can read simultaneously
SELECT * FROM table WHERE ... LOCK IN SHARE MODE;

-- Exclusive (X) lock: only one transaction can read or write
SELECT * FROM table WHERE ... FOR UPDATE;
-- ↑ Locks the rows until COMMIT or ROLLBACK — use for read-then-update patterns

-- ── InnoDB auto-locking ───────────────────────────────────────────
-- INSERT, UPDATE, DELETE automatically take exclusive row locks
-- Plain SELECT takes NO lock (uses MVCC snapshot reads by default)

-- ── Gap locks (REPEATABLE READ only) ────────────────────────────
-- Locks the GAP between indexed values to prevent phantom inserts
-- Example: lock rows where price BETWEEN 100 AND 500 also locks the gap
-- so another transaction can't INSERT price=300 until you COMMIT

-- ── See active locks & deadlock info ────────────────────────────
SHOW ENGINE INNODB STATUS;           -- last deadlock details + active locks
SELECT * FROM performance_schema.data_locks;      -- MySQL 8.0
SELECT * FROM performance_schema.data_lock_waits; -- who is waiting on whom

-- ── Manually lock entire table (rarely needed in InnoDB) ─────────
LOCK TABLES table_name WRITE;        -- exclusive table lock
LOCK TABLES table_name READ;         -- shared table lock
UNLOCK TABLES;                       -- release all table locks

-- ── Deadlock error code ───────────────────────────────────────────
-- ERROR 1213 (40001): Deadlock found when trying to get lock;
--   try restarting transaction`),
  example: pre(`-- ㉝ TechMart: concurrent orders and deadlock prevention

-- ── SCENARIO: Two customers hit the last MacBook simultaneously ──

-- Transaction A (Alice)           | Transaction B (Bob)
START TRANSACTION;                  -- | START TRANSACTION;
SELECT stock FROM products          -- |
WHERE id = 1 FOR UPDATE;           -- | -- A holds X-lock on product 1
-- stock = 1                       -- |
                                    -- | SELECT stock FROM products
                                    -- | WHERE id = 1 FOR UPDATE;
                                    -- | -- B is BLOCKED — waiting for A's lock

-- A processes the order           -- |
UPDATE products                     -- |
SET stock = stock - 1               -- |
WHERE id = 1;                       -- |

INSERT INTO orders                  -- |
  (customer_id, total)              -- |
  VALUES (1, 1999.99);              -- |
COMMIT;  -- lock released           -- | -- B's lock is granted
                                    -- | -- B reads stock = 0
                                    -- | -- B sees no stock → ROLLBACK
                                    -- | ROLLBACK;

-- ── DEADLOCK example and detection ──────────────────────────────
-- Transaction A                    | Transaction B
START TRANSACTION;                  -- | START TRANSACTION;
UPDATE products SET price=1799      -- | UPDATE products SET price=49
  WHERE id=1;  -- A locks row 1    -- |   WHERE id=6;  -- B locks row 6

UPDATE products SET stock=200       -- | UPDATE products SET stock=14
  WHERE id=6;  -- A waits for B    -- |   WHERE id=1;  -- B waits for A
-- DEADLOCK! A needs 6, B needs 1 — circular wait
-- InnoDB detects within ~50ms, rolls back the cheaper transaction
-- ERROR 1213: Deadlock found when trying to get lock

-- ── Prevention: always lock rows in the SAME ORDER ──────────────
-- Always update products by id ASC in all transactions:
-- UPDATE products WHERE id=1 → THEN UPDATE products WHERE id=6
-- Never reverse the order in another code path

-- ── Check who is blocking whom right now ─────────────────────────
SELECT
  r.trx_id    AS waiting_trx,
  r.trx_query AS waiting_query,
  b.trx_id    AS blocking_trx,
  b.trx_query AS blocking_query
FROM information_schema.innodb_lock_waits w
JOIN information_schema.innodb_trx r ON r.trx_id = w.requesting_trx_id
JOIN information_schema.innodb_trx b ON b.trx_id = w.blocking_trx_id;`),
  uc:"<strong>Real-world:</strong> Ticketmaster uses SELECT ... FOR UPDATE on seat rows so only one buyer can confirm a seat at a time — without it, two buyers could both see 'available' and both get confirmation. Amazon's inventory management teams tune lock timeout (innodb_lock_wait_timeout) and retry logic in application code because deadlocks on the orders table are expected under flash-sale load and must be handled gracefully."
},
{
  id:35, g:'Reliability', emoji:'🚨', title:'Error Handling in Stored Procedures',
  def:'DECLARE HANDLER intercepts MySQL errors and warnings inside a stored procedure — enabling try/catch logic that can log failures, return clean error messages, and recover gracefully instead of crashing silently.',
  syntax: pre(`-- ── Declare a handler (must appear after variable declarations) ──
DECLARE handler_type HANDLER FOR condition action;

-- handler_type:
--   CONTINUE  → catch error, continue executing next statement
--   EXIT      → catch error, exit the current BEGIN...END block

-- condition (what to catch):
--   SQLEXCEPTION                   -- any SQL error
--   SQLWARNING                     -- any warning (01xxx states)
--   NOT FOUND                      -- no rows found (cursor exhausted, SELECT INTO empty)
--   SQLSTATE 'XXXXX'               -- specific 5-char SQLSTATE code
--   error_number                   -- e.g. 1062 for duplicate key

-- Common SQLSTATE codes:
--   '02000' → no data / NOT FOUND
--   '23000' → integrity constraint violation (FK, UNIQUE, NOT NULL)
--   '42000' → syntax error or access rule violation
--   '40001' → deadlock detected

-- ── SIGNAL: raise a custom error ──────────────────────────────────
SIGNAL SQLSTATE '45000'            -- '45000' = user-defined exception
  SET MESSAGE_TEXT = 'Your custom error message here';

-- ── RESIGNAL: re-raise inside a handler ──────────────────────────
RESIGNAL;                          -- re-throw caught error unchanged
RESIGNAL SET MESSAGE_TEXT = 'wrapped message';

-- ── GET DIAGNOSTICS: read error info inside handler ───────────────
GET DIAGNOSTICS CONDITION 1
  @sqlstate = RETURNED_SQLSTATE,
  @errno    = MYSQL_ERRNO,
  @errmsg   = MESSAGE_TEXT;`),
  example: pre(`-- ㉞ TechMart: robust stored procedure with full error handling

DELIMITER $$
CREATE PROCEDURE safe_place_order(
  IN  p_customer_id INT,
  IN  p_product_id  INT,
  IN  p_quantity    INT,
  OUT p_result      VARCHAR(200)
)
BEGIN
  -- ── Local variables ──────────────────────────────────────────────
  DECLARE v_price      DECIMAL(10,2);
  DECLARE v_stock      INT;
  DECLARE v_order_id   INT;
  DECLARE v_errno      INT;
  DECLARE v_errmsg     VARCHAR(500);
  DECLARE v_sqlstate   CHAR(5);

  -- ── Handlers (must come after DECLARE variables) ─────────────────
  -- Catch duplicate key (UNIQUE constraint violation)
  DECLARE EXIT HANDLER FOR 1062
  BEGIN
    ROLLBACK;
    SET p_result = 'ERROR: Duplicate entry — order already exists.';
  END;

  -- Catch FK violation (customer or product doesn't exist)
  DECLARE EXIT HANDLER FOR 1452
  BEGIN
    ROLLBACK;
    SET p_result = 'ERROR: Customer or product ID not found.';
  END;

  -- Catch deadlock
  DECLARE EXIT HANDLER FOR 1213
  BEGIN
    ROLLBACK;
    SET p_result = 'ERROR: System busy, please try again.';
  END;

  -- Catch ANY other SQL error
  DECLARE EXIT HANDLER FOR SQLEXCEPTION
  BEGIN
    ROLLBACK;
    GET DIAGNOSTICS CONDITION 1
      v_errno = MYSQL_ERRNO, v_errmsg = MESSAGE_TEXT;
    SET p_result = CONCAT('ERROR [', v_errno, ']: ', v_errmsg);

  -- 1. Validate product exists and has stock

    SIGNAL SQLSTATE '45000' SET MESSAGE_TEXT = 'Product not found.';
  END IF;

  IF v_stock < p_quantity THEN
    SIGNAL SQLSTATE '45000'
      SET MESSAGE_TEXT = 'Insufficient stock for the requested quantity.';
  END IF;

  -- 2. Validate customer exists
  IF NOT EXISTS (SELECT 1 FROM customers WHERE id = p_customer_id) THEN
    SIGNAL SQLSTATE '45000' SET MESSAGE_TEXT = 'Customer not found.';
  END IF;

    VALUES (v_order_id, p_product_id, p_quantity, v_price);

    UPDATE products SET stock = stock - p_quantity WHERE id = p_product_id;

                        ROUND(v_price * p_quantity, 2));

  id:39, g:'Advanced Design', emoji:'🗂️', title:'Partitioning',
  def:'Partitioning splits one logical table into multiple physical storage segments — MySQL queries only the relevant partition(s) (partition pruning), making range scans on massive tables dramatically faster without application changes.',
  syntax: pre(`-- ══ RANGE partitioning — by value ranges ═════════════════════════
-- Most common for time-series data (partition by year/month)
CREATE TABLE orders_partitioned (
  id         INT AUTO_INCREMENT,
  created_at DATETIME NOT NULL,
  total      DECIMAL(10,2),
  status     VARCHAR(20),
  PRIMARY KEY (id, created_at)   -- partition key MUST be in PK
)
PARTITION BY RANGE (YEAR(created_at)) (
  PARTITION p2022 VALUES LESS THAN (2023),
  PARTITION p2023 VALUES LESS THAN (2024),
  PARTITION p2024 VALUES LESS THAN (2025),
  PARTITION p2025 VALUES LESS THAN (2026),
  PARTITION pmax  VALUES LESS THAN MAXVALUE   -- catch-all
);

-- ══ LIST partitioning — by specific discrete values ═══════════════
PARTITION BY LIST (status_code) (
  PARTITION p_active   VALUES IN (1, 2, 3),
  PARTITION p_inactive VALUES IN (4, 5),
  PARTITION p_deleted  VALUES IN (0)
);

-- ══ HASH partitioning — distribute evenly (no range queries) ══════
PARTITION BY HASH (customer_id)
PARTITIONS 8;    -- spread across 8 equal partitions

-- ══ KEY partitioning — MySQL chooses the hash function ════════════
PARTITION BY KEY (customer_id)
PARTITIONS 4;

-- ══ Manage partitions ════════════════════════════════════════════
ALTER TABLE t ADD PARTITION (PARTITION p2026 VALUES LESS THAN (2027));
ALTER TABLE t DROP PARTITION p2022;                    -- drop + delete data
ALTER TABLE t TRUNCATE PARTITION p2022;                -- drop data, keep structure
ALTER TABLE t REORGANIZE PARTITION pmax INTO (...);    -- split a catch-all

-- ══ Verify partition pruning with EXPLAIN ═════════════════════════
EXPLAIN SELECT * FROM orders_partitioned
WHERE YEAR(created_at) = 2024;
-- partitions: p2024  ← only ONE partition scanned!`),

-- ── Create partitioned orders table ─────────────────────────────

-- ── Partition pruning in action ──────────────────────────────────

  def:'MySQL\'s Event Scheduler is a built-in cron daemon — an Event runs any SQL statement or stored procedure on a one-time or recurring schedule, eliminating the need for external cron jobs for database maintenance tasks.',
  syntax: pre(`-- ── Enable the scheduler (must be ON for events to fire) ────────

-- ── CREATE EVENT syntax ───────────────────────────────────────────
CREATE EVENT [IF NOT EXISTS] event_name
ON SCHEDULE schedule_definition
[ON COMPLETION [NOT] PRESERVE]   -- keep event after it runs (for one-time)
[ENABLE | DISABLE]
[COMMENT 'description']
DO

-- ── Schedule options ─────────────────────────────────────────────
AT 'YYYY-MM-DD HH:MM:SS'                        -- one-time, specific datetime

EVERY n unit                                     -- recurring, simple interval

ALTER EVENT event_name DISABLE;                  -- pause without deleting

ALTER EVENT event_name ON SCHEDULE EVERY 12 HOUR; -- change schedule

  id:41, g:'Advanced Design', emoji:'🖱️', title:'Cursors',
  def:'A Cursor iterates over a query result set one row at a time inside a stored procedure — the escape hatch for complex row-by-row business logic that set-based SQL operations cannot express as a single query.',
  syntax: pre(`-- Cursor lifecycle: DECLARE → OPEN → FETCH (loop) → CLOSE
-- All DECLARE statements must come before any executable statements

DELIMITER $$
CREATE PROCEDURE proc_with_cursor()
BEGIN
  -- 1. Declare local variables to receive each row's values
  DECLARE v_done    INT DEFAULT 0;
  DECLARE v_col1    DATATYPE;
  DECLARE v_col2    DATATYPE;

  -- 2. Declare the cursor (just defines the query — does NOT run it yet)
  DECLARE cur_name CURSOR FOR
    SELECT col1, col2 FROM table WHERE condition ORDER BY col1;

  -- 3. Declare NOT FOUND handler — sets v_done=1 when cursor runs out
  --    MUST be declared AFTER the cursor declaration
  DECLARE CONTINUE HANDLER FOR NOT FOUND SET v_done = 1;

  -- 4. Open cursor (executes the query, positions before first row)
  OPEN cur_name;

  -- 5. Fetch loop
  fetch_loop: LOOP
    FETCH cur_name INTO v_col1, v_col2;   -- read next row into variables
    IF v_done = 1 THEN
      LEAVE fetch_loop;                   -- exit when no more rows
    END IF;
    -- ... process v_col1, v_col2 here ...
  END LOOP;

  -- 6. Close cursor (releases resources)
  CLOSE cur_name;
END $$
DELIMITER ;

-- Important limitations:
-- • Cursors are READ-ONLY in MySQL (cannot UPDATE through cursor)
-- • Forward-only — cannot scroll back to a previous row
-- • Slow for large datasets — prefer set-based SQL when possible
-- • Only usable inside stored procedures, functions, or triggers`),
  example: pre(`-- ㊵ TechMart: tiered loyalty bonus calculation using a cursor
-- Business rule: bonus rate changes based on CURRENT accumulated points
-- Reason for cursor: each customer's rate depends on their running total
-- which changes as we process each order — can't express this as a single UPDATE

DELIMITER $$
CREATE PROCEDURE apply_tiered_loyalty_bonus()
BEGIN
  -- Variables for each customer row
  DECLARE v_done         INT DEFAULT 0;
  DECLARE v_customer_id  INT;
  DECLARE v_name         VARCHAR(100);
  DECLARE v_current_pts  INT;
  DECLARE v_orders_today INT;
  DECLARE v_bonus        INT;

  -- Cursor: every customer who placed a delivered order today
  DECLARE cur_customers CURSOR FOR
    SELECT DISTINCT c.id, c.name, c.loyalty_points,
           COUNT(o.id) AS orders_count
    FROM customers c
    JOIN orders o ON c.id = o.customer_id
    WHERE o.status = 'delivered'
      AND DATE(o.created_at) = CURDATE()
    GROUP BY c.id, c.name, c.loyalty_points
    ORDER BY c.id;

  DECLARE CONTINUE HANDLER FOR NOT FOUND SET v_done = 1;

  OPEN cur_customers;

  customer_loop: LOOP
    FETCH cur_customers INTO v_customer_id, v_name, v_current_pts, v_orders_today;

    IF v_done = 1 THEN
      LEAVE customer_loop;
    END IF;

    -- Tiered bonus: rate depends on CURRENT points BEFORE this bonus
    SET v_bonus = CASE
      WHEN v_current_pts <   500 THEN v_orders_today * 10   -- Bronze
      WHEN v_current_pts <  2000 THEN v_orders_today * 25   -- Silver
      WHEN v_current_pts <  5000 THEN v_orders_today * 50   -- Gold
      ELSE                            v_orders_today * 100  -- Platinum
    END;

    -- Apply the bonus for this specific customer
    UPDATE customers
    SET loyalty_points = loyalty_points + v_bonus
    WHERE id = v_customer_id;

    -- Optionally log the bonus for audit
    INSERT INTO loyalty_audit (customer_id, bonus_pts, reason, applied_at)
    VALUES (v_customer_id, v_bonus, 'Daily order bonus', NOW());

  END LOOP;

  CLOSE cur_customers;
END $$
DELIMITER ;

-- Execute the cursor-based procedure
CALL apply_tiered_loyalty_bonus();

-- ── When NOT to use cursors ────────────────────────────────────────
-- Prefer set-based UPDATE for uniform rates (much faster):
UPDATE customers c
JOIN (
  SELECT customer_id, COUNT(*) AS cnt
  FROM orders WHERE status='delivered' AND DATE(created_at) = CURDATE()
  GROUP BY customer_id
) AS daily ON c.id = daily.customer_id
SET c.loyalty_points = c.loyalty_points + daily.cnt * 10;
-- ↑ Processes ALL customers in one SQL operation — no loop, no cursor`),
  uc:"<strong>Real-world:</strong> Insurance companies use cursors to calculate compound interest on policies where each month's base depends on the previous month's result — impossible to express as a set operation. ERP systems (SAP, Oracle) use cursor-based procedures for month-end closing where each GL account's balance rollover feeds the next account in sequence. The general rule: cursors are valid when row N's output depends on the result of processing row N-1."
},

  syntax: pre(`-- INFORMATION_SCHEMA is a virtual DB — no physical files
-- Always USE it to query metadata about your own schema

-- ── Key virtual tables ────────────────────────────────────────────
INFORMATION_SCHEMA.SCHEMATA             -- all databases on server
INFORMATION_SCHEMA.TABLES               -- all tables (with row counts, sizes, engine)
INFORMATION_SCHEMA.COLUMNS              -- every column definition (type, default, nullable)
INFORMATION_SCHEMA.STATISTICS           -- all indexes (key name, seq, unique, column)
INFORMATION_SCHEMA.TABLE_CONSTRAINTS    -- named constraints (PK, UNIQUE, FK, CHECK)
INFORMATION_SCHEMA.KEY_COLUMN_USAGE     -- FK relationships (what points where)
INFORMATION_SCHEMA.REFERENTIAL_CONSTRAINTS  -- FK delete/update rules (CASCADE, RESTRICT)
INFORMATION_SCHEMA.ROUTINES             -- stored procedures and functions
INFORMATION_SCHEMA.TRIGGERS             -- all trigger definitions
INFORMATION_SCHEMA.VIEWS                -- all view definitions
INFORMATION_SCHEMA.EVENTS               -- scheduled events
INFORMATION_SCHEMA.PARTITIONS           -- partition details and row counts
INFORMATION_SCHEMA.USER_PRIVILEGES      -- DCL grants per user
INFORMATION_SCHEMA.PROCESSLIST          -- currently running queries (like SHOW PROCESSLIST)
INFORMATION_SCHEMA.INNODB_LOCKS         -- current lock details
INFORMATION_SCHEMA.INNODB_METRICS       -- InnoDB engine metrics

-- ── Shortcuts (equivalent but faster for simple cases) ───────────
SHOW DATABASES;

  example: pre(`-- ㊶ TechMart: using INFORMATION_SCHEMA as a database X-ray

-- 1. List all tables in techmart with row counts and storage size
SELECT
  TABLE_NAME,
  TABLE_ROWS                            AS approx_rows,
  ROUND(DATA_LENGTH  / 1024 / 1024, 2) AS data_mb,
  ROUND(INDEX_LENGTH / 1024 / 1024, 2) AS index_mb,
  ENGINE,
  TABLE_COLLATION
FROM information_schema.TABLES
WHERE TABLE_SCHEMA = 'techmart'
ORDER BY DATA_LENGTH DESC;

-- 2. Find every column that is nullable (potential NULL-handling bugs)
SELECT TABLE_NAME, COLUMN_NAME, DATA_TYPE, COLUMN_DEFAULT
FROM information_schema.COLUMNS
WHERE TABLE_SCHEMA = 'techmart'
  AND IS_NULLABLE = 'YES'
ORDER BY TABLE_NAME, ORDINAL_POSITION;

-- 3. Map all FK relationships in the database
SELECT
  kcu.TABLE_NAME        AS child_table,
  kcu.COLUMN_NAME       AS child_column,
  kcu.REFERENCED_TABLE_NAME  AS parent_table,
  kcu.REFERENCED_COLUMN_NAME AS parent_column,
  rc.DELETE_RULE,
  rc.UPDATE_RULE
FROM information_schema.KEY_COLUMN_USAGE kcu
JOIN information_schema.REFERENTIAL_CONSTRAINTS rc
  ON kcu.CONSTRAINT_NAME = rc.CONSTRAINT_NAME
  AND kcu.TABLE_SCHEMA   = rc.CONSTRAINT_SCHEMA
WHERE kcu.TABLE_SCHEMA = 'techmart'
  AND kcu.REFERENCED_TABLE_NAME IS NOT NULL
ORDER BY child_table;

-- 4. Find all indexes across all tables
SELECT
  TABLE_NAME, INDEX_NAME, COLUMN_NAME,
  NON_UNIQUE,
  CARDINALITY              -- estimate of unique values (higher = more selective)
FROM information_schema.STATISTICS
WHERE TABLE_SCHEMA = 'techmart'
ORDER BY TABLE_NAME, INDEX_NAME, SEQ_IN_INDEX;

-- 5. Find tables with NO indexes (beyond PK) — potential performance risk
SELECT t.TABLE_NAME
FROM information_schema.TABLES t
WHERE t.TABLE_SCHEMA = 'techmart'
  AND t.TABLE_TYPE = 'BASE TABLE'
  AND t.TABLE_NAME NOT IN (
    SELECT DISTINCT TABLE_NAME FROM information_schema.STATISTICS
    WHERE TABLE_SCHEMA = 'techmart'
      AND INDEX_NAME != 'PRIMARY'
  );

-- 6. Kill long-running queries (find then kill)
SELECT ID, USER, HOST, DB, TIME, STATE, LEFT(INFO, 80) AS query
FROM information_schema.PROCESSLIST
WHERE TIME > 30                      -- running longer than 30 seconds
  AND COMMAND != 'Sleep';
-- Then: KILL QUERY 1234;            -- kill just the query, keep connection
--       KILL CONNECTION 1234;       -- kill the entire connection

-- 7. Auto-generate ALTER TABLE for all INT columns missing an index
SELECT CONCAT(
  'CREATE INDEX idx_', COLUMN_NAME, ' ON ', TABLE_NAME,
  '(', COLUMN_NAME, ');'
) AS suggested_index
FROM information_schema.COLUMNS
WHERE TABLE_SCHEMA = 'techmart'

  AND COLUMN_NAME != 'id'
  AND COLUMN_NAME NOT IN (
    SELECT COLUMN_NAME FROM information_schema.STATISTICS
    WHERE TABLE_SCHEMA = 'techmart'
  );`),

{
  id:43, g:'Advanced Design', emoji:'🌐', title:'Character Sets & Collation',
  def:'A character set defines which characters MySQL can store; a collation defines how characters are compared and sorted — using the wrong charset causes emoji to corrupt silently, and the wrong collation makes case-sensitive searches fail in unexpected ways.',
  syntax: pre(`-- ══ CHARACTER SETS ══════════════════════════════════════════════
-- MySQL's confusingly named 'utf8' is NOT true UTF-8:
--   utf8   → max 3 bytes/char → cannot store emoji or rare Unicode
--   utf8mb4 → max 4 bytes/char → TRUE UTF-8 → stores ALL Unicode ✓
-- Always use utf8mb4 for new databases.

-- ══ COLLATIONS ═══════════════════════════════════════════════════
-- Suffix meanings:
--   _ci   → case-insensitive     ('a' = 'A', 'café' = 'CAFÉ')
--   _cs   → case-sensitive       ('a' ≠ 'A')
--   _bin  → binary byte-by-byte  ('a' ≠ 'A', 'é' ≠ 'e')
--   _ai   → accent-insensitive   ('cafe' = 'café')
--   _as   → accent-sensitive     ('cafe' ≠ 'café')

-- Common collations:
--   utf8mb4_unicode_ci   → case+accent insensitive (general use)
--   utf8mb4_bin          → exact byte matching (passwords, codes)
--   utf8mb4_0900_ai_ci   → MySQL 8.0 default, fastest (case+accent insensitive)

-- ══ Scope hierarchy (overrides cascade down) ══════════════════════
-- Server (my.cnf) → Database → Table → Column → Literal

-- ══ Syntax ═══════════════════════════════════════════════════════
-- Set at database level
CREATE DATABASE techmart CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
ALTER DATABASE techmart CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

-- Set at table level
CREATE TABLE t (...) CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
ALTER TABLE t CONVERT TO CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

-- Set at column level (overrides table)
name VARCHAR(100) CHARACTER SET utf8mb4 COLLATE utf8mb4_bin

-- Apply collation in a single query (without changing the column)
SELECT name FROM customers ORDER BY name COLLATE utf8mb4_unicode_ci;

-- Check current settings
SHOW VARIABLES LIKE 'character_set%';
SHOW VARIABLES LIKE 'collation%';
SHOW CHARACTER SET;           -- all available charsets
SHOW COLLATION WHERE Charset = 'utf8mb4';   -- collations for utf8mb4

-- Convert a value's charset/collation at query time
SELECT CONVERT(name USING utf8mb4) FROM customers;`),
  example: pre(`-- ㊷ TechMart: internationalization and emoji support

-- 1. Diagnose current character set settings
SHOW VARIABLES LIKE 'character_set_database';
-- utf8mb4 ✓ (if it shows 'utf8' → old 3-byte charset, upgrade!)
SHOW VARIABLES LIKE 'collation_database';
-- utf8mb4_unicode_ci ✓

-- 2. What happens WITHOUT utf8mb4 (the bug):
-- If database is latin1 or utf8 (3-byte):
INSERT INTO customers (name) VALUES ('João 😊');
-- 'utf8': 😊 = 4 bytes → stored as '????' or ERROR 1366
-- utf8mb4: 😊 stored and retrieved perfectly ✓

-- 3. Fix existing tables to utf8mb4
ALTER TABLE customers  CONVERT TO CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
ALTER TABLE products   CONVERT TO CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
ALTER TABLE orders     CONVERT TO CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
ALTER TABLE order_items CONVERT TO CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

-- 4. Case-insensitive search (default _ci behavior)
-- utf8mb4_unicode_ci: 'macbook' matches 'MacBook', 'MACBOOK', 'MaCbOoK'
SELECT name FROM products WHERE name LIKE '%macbook%';
-- Returns: 'MacBook Pro'  ← works even with lowercase search term ✓

-- 5. Case-SENSITIVE search when you need exact match
-- Use _bin collation for one query:
SELECT name FROM customers
WHERE name = 'alice' COLLATE utf8mb4_bin;
-- Returns nothing — 'alice' ≠ 'Alice' in binary collation

-- Or define the column as case-sensitive permanently:
ALTER TABLE customers
  MODIFY COLUMN email VARCHAR(200) CHARACTER SET utf8mb4 COLLATE utf8mb4_bin;
-- Now email lookups are exact-case: 'Alice@Mail.com' ≠ 'alice@mail.com'
-- Good for email/username columns where case matters for security

-- utf8mb4_unicode_ci is accent-INsensitive:
SELECT * FROM customers WHERE name = 'João';    -- also matches 'Joao' ← bug!
-- Use utf8mb4_0900_as_cs for accent-SENSITIVE, case-SENSITIVE:

-- 7. Sort order depends on collation
SELECT name FROM customers ORDER BY name;
-- _unicode_ci: João sorts near 'J' (ignores accent for sorting)
-- _bin:        João sorts AFTER all ASCII — by byte value of 'J' + ã

-- 8. Check column-level charset in INFORMATION_SCHEMA

FROM information_schema.COLUMNS
WHERE TABLE_SCHEMA = 'techmart'

// ─── ACID CARDS ──────────────────────────────────────────────────────────────
function acidCards() {
  const props = [
    {l:'A', name:'Atomicity',
     one:'All or nothing.',
     def:'Every statement in a transaction either ALL succeed or ALL roll back. No partial updates survive.'},
    {l:'C', name:'Consistency',
     one:'Valid state → valid state.',
     def:'A transaction can only bring the DB from one valid state to another. Constraints, cascades, and rules are always respected.'},
    {l:'I', name:'Isolation',
     one:'Concurrent ≠ interfering.',
     def:'Transactions running in parallel behave as if they ran sequentially. One transaction cannot read another\'s uncommitted changes.'},
    {l:'D', name:'Durability',
     one:'Committed = permanent.',
     def:'Once COMMIT succeeds, the data survives crashes, power failures, and restarts — written to disk via the redo log.'},
  ];
  return `<div class="acid-grid">${props.map(p=>`
    <div class="acid-card">
      <div class="acid-letter">${p.l}</div>
      <div class="acid-name">${p.name}</div>
      <div class="acid-one">${p.one}</div>
      <div class="acid-def">${p.def}</div>

  <table class="iso-table" style="margin-top:16px">

    <tr><td>READ UNCOMMITTED</td><td class="cross">✗ possible</td><td class="cross">✗ possible</td><td class="cross">✗ possible</td></tr>
    <tr><td>READ COMMITTED</td><td class="tick">✓ prevented</td><td class="cross">✗ possible</td><td class="cross">✗ possible</td></tr>
    <tr><td>REPEATABLE READ <em style="color:var(--acc);font-size:10px">(MySQL default)</em></td><td class="tick">✓ prevented</td><td class="tick">✓ prevented</td><td class="cross">✗ possible</td></tr>

  </table>`;
}

// ─── NORMALIZATION ROWS ───────────────────────────────────────────────────────
function nfRows() {
  const nfs = [
    {tag:'1NF',rule:'Atomic values + no repeating groups',
     desc:'Each cell contains one indivisible value. No "product1, product2" columns. Every row is unique (has a PK). No arrays or lists inside a cell.'},
    {tag:'2NF',rule:'No partial dependency on composite PK',
     desc:'Every non-key column depends on the WHOLE primary key. Applies only when PK spans multiple columns. order_items.price depends on (order_id, product_id) — not just one of them.'},
    {tag:'3NF',rule:'No transitive dependency',
     desc:'No non-key column depends on another non-key column. If orders stored customer_city, then city → customer_id → order_id would be transitive. Move city to the customers table.'},
    {tag:'BCNF',rule:'Every determinant is a candidate key',
     desc:'Stricter 3NF. If X → Y and X is not a superkey, move X and Y to a separate table. Eliminates edge-case anomalies 3NF misses.'},
  ];
  return nfs.map(n=>`
    <div class="nf-row">
      <div class="nf-tag">${n.tag}</div>
      <div class="nf-body">
        <div class="nf-rule">${n.rule}</div>
        <div class="nf-desc">${n.desc}</div>
      </div>
    </div>`).join('');
}
